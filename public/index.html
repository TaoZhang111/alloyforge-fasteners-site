<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlloyForge Fasteners</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        var supported = ["en", "ar", "es"];
        var language = (navigator.language || "en").slice(0, 2).toLowerCase();
        var target = supported.indexOf(language) === -1 ? "en" : language;
        window.location.replace("/" + target + "/");
      })();
    </script>
    <meta http-equiv="refresh" content="1; url=/en/" />
  </head>
  <body>
    <p><a href="/en/">English</a> · <a href="/ar/">العربية</a> · <a href="/es/">Español</a></p>
